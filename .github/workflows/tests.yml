name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed"

    - name: Generate test report
      run: |
        dotnet tool install dotnet-reportgenerator-globaltool --tool-path tools
        tools/reportgenerator -reports:"**/TestResults/**/*.xml" -targetdir:"coverage-report" -reporttypes:Html

    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: Test Results
        path: TestResults

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: Coverage Report
        path: coverage-report

    - name: Check code coverage
      run: |
        # This is a placeholder - actual coverage checking would require a coverage tool
        echo "Code coverage check completed"

  test-platforms:
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Test on ${{ matrix.os }}
      run: dotnet test --configuration Release --no-build --verbosity minimal

  integration-tests:
    needs: build-and-test
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Run integration tests
      run: |
        dotnet test --configuration Release --no-build --filter "IntegrationTests"

    - name: Run UI tests
      run: |
        dotnet test --configuration Release --no-build --filter "UITests"

    - name: Run performance tests
      run: |
        dotnet test --configuration Release --no-build --filter "PerformanceTests"